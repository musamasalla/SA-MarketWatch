name: Build SA MarketWatch

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Create and boot simulator
      run: |
        # Values observed from the runner's available simctl list
        RUNTIME="com.apple.CoreSimulator.SimRuntime.iOS-18-5"
        DEVICE_TYPE="com.apple.CoreSimulator.SimDeviceType.iPhone-16-Pro"
        
        echo "Creating simulator with runtime: $RUNTIME"
        echo "Device type: $DEVICE_TYPE"
        
        # Create simulator
        UDID=$(xcrun simctl create "CI_Sim" "$DEVICE_TYPE" "$RUNTIME")
        echo "Created simulator UDID: $UDID"
        
        # Boot simulator
        xcrun simctl boot "$UDID" 2>/dev/null || true
        sleep 10
        
        # Verify boot state
        STATE=$(xcrun simctl list -j | jq -r ".devices[\"$RUNTIME\"][] | select(.udid==\"$UDID\") | .state" 2>/dev/null || echo "unknown")
        echo "Simulator state: $STATE"
        
        # Export for later steps
        echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
    
    - name: Build
      run: |
        xcodebuild build \
          -scheme SA-MarketWatch \
          -destination "id=$SIMULATOR_UDID" \
          -skipPackagePluginValidation \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO
    
    - name: Test
      run: |
        xcodebuild test \
          -scheme SA-MarketWatch \
          -destination "id=$SIMULATOR_UDID" \
          -skipPackagePluginValidation \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO || true
