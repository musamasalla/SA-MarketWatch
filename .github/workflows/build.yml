name: Build SA MarketWatch

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build
      run: |
        SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)
        swift build \
          -Xswiftc -sdk -Xswiftc "$SDK_PATH" \
          -Xswiftc -target -Xswiftc arm64-apple-ios17.0-simulator

    - name: Test
      run: |
        SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)
        swift test \
          -Xswiftc -sdk -Xswiftc "$SDK_PATH" \
          -Xswiftc -target -Xswiftc arm64-apple-ios17.0-simulator || true
