name: Build SA MarketWatch

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: List available Xcode versions
      run: ls /Applications/Xcode*.app 2>/dev/null || echo "Checking xcode-select..."
    
    - name: Select latest available Xcode
      run: |
        # Try common versions, fall back to default
        for version in "Xcode_16.2.app" "Xcode_16.1.app" "Xcode_16.app" "Xcode_15.4.app" "Xcode_15.2.app"; do
          if [ -d "/Applications/$version" ]; then
            echo "Found $version"
            sudo xcode-select -s "/Applications/$version"
            exit 0
          fi
        done
        echo "Using default Xcode"
      
    - name: Build iOS app
      run: |
        xcodebuild build \
          -scheme SA-MarketWatch \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
          -skipPackagePluginValidation \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO
          
    - name: Run tests
      run: |
        xcodebuild test \
          -scheme SA-MarketWatch \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
          -skipPackagePluginValidation \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO || true
