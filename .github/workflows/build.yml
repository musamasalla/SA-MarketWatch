name: Build SA MarketWatch

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Simulator & Build
      run: |
        set -e
        
        echo "=== iOS Runtime ==="
        RUNTIME="com.apple.CoreSimulator.SimRuntime.iOS-18-5"
        echo "Using: $RUNTIME"
        
        echo "=== Device Type ==="
        DEVICE_TYPE="com.apple.CoreSimulator.SimDeviceType.iPhone-16-Pro"
        echo "Using: $DEVICE_TYPE"
        
        # Create simulator
        echo "Creating simulator..."
        UDID=$(xcrun simctl create "CI_Test" "$DEVICE_TYPE" "$RUNTIME" 2>&1)
        echo "Created: $UDID"
        
        if [ -z "$UDID" ] || [[ "$UDID" == *"Error"* ]]; then
          echo "Creation failed, trying to list and reuse..."
          # Try to find existing simulator
          UDID=$(xcrun simctl list devices -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for devicetype in data.get('devices', {}).get('iOS 18-5', []):
              if 'CI_Test' in devicetype.get('name', ''):
                  print(devicetype['udid'])
                  break
          ") || echo ""
        fi
        
        if [ -z "$UDID" ]; then
          echo "Still no UDID, creating with different name..."
          UDID=$(xcrun simctl create "Test_iPhone_16_Pro" "$DEVICE_TYPE" "$RUNTIME")
        fi
        
        echo "Final UDID: $UDID"
        
        # Boot simulator
        echo "Booting simulator..."
        xcrun simctl boot "$UDID" 2>/dev/null || echo "Boot command issued"
        sleep 5
        
        # Verify it's booted
        STATE=$(xcrun simctl list devices -j | python3 -c "
        import json, sys
        data = json.load(sys.stdin)
        for devicetype in data.get('devices', {}).get('iOS 18-5', []):
            if devicetype.get('udid') == '$UDID':
                print(devicetype.get('state', 'Unknown'))
                break
        ")
        echo "Simulator state: $STATE"
        
        # Build
        echo "=== Building ==="
        xcodebuild build \
          -scheme SA-MarketWatch \
          -destination "id=$UDID" \
          -skipPackagePluginValidation \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO
        
        # Test
        echo "=== Testing ==="
        xcodebuild test \
          -scheme SA-MarketWatch \
          -destination "id=$UDID" \
          -skipPackagePluginValidation \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO || true
